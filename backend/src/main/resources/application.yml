server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: fleet-central-system

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/fleet_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

fleet:
  alert:
    temperature-threshold: ${TEMPERATURE_THRESHOLD:8.0}
    consecutive-count: ${CONSECUTIVE_COUNT:3}
